<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Select Folio Workspace</title>
    <style>
      :root{color-scheme:light dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
      body{margin:0;background:Canvas;color:CanvasText;min-width:360px;}
      main{padding:20px;display:flex;flex-direction:column;gap:14px;}
      h1{font-size:18px;line-height:1.25;margin:0;font-weight:650;}
      p{margin:0;color:color-mix(in srgb, CanvasText 68%, transparent);font-size:13px;line-height:1.4;}
      .actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px;}
      button{border:1px solid color-mix(in srgb, CanvasText 14%, transparent);border-radius:999px;padding:9px 14px;background:transparent;color:inherit;font:inherit;font-size:13px;cursor:pointer;}
      button.primary{background:CanvasText;color:Canvas;border-color:CanvasText;}
      button:disabled{opacity:.6;cursor:default;}
      #status{min-height:18px;font-size:12px;color:color-mix(in srgb, CanvasText 62%, transparent);white-space:pre-line;}
    </style>
  </head>
  <body>
    <main>
      <div>
        <h1>Select Folio workspace</h1>
        <p>Choose the local folder Folio can read. This permission stays scoped to the folder you select.</p>
      </div>
      <p id="status" role="status">Click Select folder if the native folder picker does not open automatically.</p>
      <div class="actions">
        <button id="cancel" type="button">Cancel</button>
        <button id="select" type="button" class="primary">Select folder</button>
      </div>
    </main>
    <script type="module" src="workspace-picker.js"></script>
  </body>
</html>
